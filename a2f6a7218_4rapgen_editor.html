<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4RAP.GEN — Editor článků</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFD800;
    --black: #000;
    --white: #fff;
    --red: #FF4A4A;
    --green: #39FF14;
    --blue: #00BFFF;
    --bg: #FFDE00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(rgba(0,0,0,.12) 2px, transparent 2px);
    background-size: 24px 24px;
    color: var(--black);
    min-height: 100vh;
  }
  .neo { border: 4px solid #000; }
  .neo-shadow { box-shadow: 8px 8px 0 #000; }
  h1,h2,h3,.heading { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

  header {
    background: #000; color: #fff;
    padding: 1rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 4px solid #000;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.8rem; letter-spacing: -.03em; color: #fff; }
  header span.logo-hash { color: #39FF14; }
  .header-sub { color: #FFD800; font-weight: 700; font-size: .9rem; }

  .app { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 64px); }
  
  .sidebar {
    background: #fff; border-right: 4px solid #000;
    padding: 1rem; display: flex; flex-direction: column; gap: .75rem;
    overflow-y: auto; max-height: calc(100vh - 64px);
  }
  .sidebar-title { font-family: 'Archivo Black', sans-serif; font-size: .8rem; text-transform: uppercase; padding: .5rem 0; border-bottom: 3px solid #000; margin-bottom: .25rem; }
  .article-item {
    border: 3px solid #000; padding: .6rem .75rem; cursor: pointer;
    background: #fff; transition: all .1s;
  }
  .article-item:hover, .article-item.active { background: #FFD800; box-shadow: 4px 4px 0 #000; transform: translate(-2px,-2px); }
  .article-item .item-title { font-weight: 700; font-size: .9rem; line-height: 1.3; }
  .article-item .item-meta { font-size: .75rem; color: #666; margin-top: .25rem; display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .badge { display: inline-block; padding: .15rem .5rem; font-size: .7rem; font-weight: 700; text-transform: uppercase; border: 2px solid #000; }
  .badge-Raperi { background: #FF4A4A; color: #fff; }
  .badge-Navody { background: #39FF14; color: #000; }
  .badge-Clanky { background: #00BFFF; color: #000; }
  .badge-Raperi, .badge-rap { background: #FF4A4A; color: #fff; }
  .badge-koncept { background: #eee; color: #555; }
  .badge-pub { background: #39FF14; color: #000; }

  .btn {
    border: 4px solid #000; padding: .6rem 1rem; font-family: 'Archivo Black', sans-serif;
    font-size: .85rem; text-transform: uppercase; cursor: pointer; background: #fff;
    box-shadow: 5px 5px 0 #000; transition: all .1s; display: flex; align-items: center; gap: .5rem;
    justify-content: center; width: 100%;
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #000; }
  .btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 #000; }
  .btn-black { background: #000; color: #fff; }
  .btn-yellow { background: #FFD800; }
  .btn-red { background: #FF4A4A; color: #fff; }
  .btn-green { background: #39FF14; }
  .btn-sm { padding: .4rem .75rem; font-size: .75rem; box-shadow: 3px 3px 0 #000; width: auto; }
  .btn-sm:hover { box-shadow: 5px 5px 0 #000; }

  .main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: calc(100vh - 64px); }
  
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .field { display: flex; flex-direction: column; gap: .3rem; }
  .field label { font-family: 'Archivo Black', sans-serif; font-size: .75rem; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    border: 3px solid #000; padding: .5rem .75rem; font-family: 'Space Grotesk', sans-serif;
    font-size: .95rem; font-weight: 500; background: #fff; width: 100%;
    outline: none; transition: box-shadow .1s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { box-shadow: 4px 4px 0 #000; }
  
  .editor-area { border: 4px solid #000; background: #fff; }
  .editor-toolbar {
    background: #000; padding: .5rem .75rem; display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
  }
  .toolbar-btn {
    background: transparent; border: 2px solid #555; color: #fff; padding: .2rem .5rem;
    font-size: .75rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all .1s;
  }
  .toolbar-btn:hover { background: #FFD800; color: #000; border-color: #FFD800; }
  #contentEditor {
    width: 100%; min-height: 400px; padding: 1rem; font-family: 'Space Grotesk', sans-serif;
    font-size: .95rem; line-height: 1.75; border: none; resize: vertical; background: #fff;
    outline: none; font-weight: 500;
  }

  .score-panel { border: 4px solid #000; background: #fff; padding: 1rem; }
  .score-panel-title { font-family: 'Archivo Black', sans-serif; font-size: .85rem; text-transform: uppercase; margin-bottom: .75rem; display: flex; justify-content: space-between; align-items: center; }
  .score-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: .5rem; margin-bottom: .75rem; }
  .score-item { text-align: center; border: 3px solid #000; padding: .4rem .25rem; }
  .score-item .score-val { font-family: 'Archivo Black', sans-serif; font-size: 1.4rem; }
  .score-item .score-lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase; }
  .score-total { font-family: 'Archivo Black', sans-serif; font-size: 2rem; }
  .score-feedback { font-size: .9rem; font-weight: 500; line-height: 1.6; color: #333; margin-top: .5rem; }
  .verdict-pass { color: #16a34a; }
  .verdict-rewrite { color: #dc2626; }

  .actions { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; }

  .upload-zone {
    border: 4px dashed #000; padding: 1.5rem; text-align: center; background: #fff;
    cursor: pointer; transition: all .1s;
  }
  .upload-zone:hover { background: #FFD800; }
  .upload-zone p { font-weight: 700; font-size: .9rem; }
  .upload-zone .sub { font-size: .8rem; color: #666; margin-top: .3rem; }

  .status-bar {
    background: #000; color: #fff; padding: .5rem 1rem; font-size: .85rem; font-weight: 700;
    display: flex; align-items: center; gap: .5rem;
  }
  .status-bar.success { background: #16a34a; }
  .status-bar.error { background: #dc2626; }
  .status-bar.loading { background: #1d4ed8; }
  .hidden { display: none !important; }

  .tabs { display: flex; gap: 0; border-bottom: 4px solid #000; }
  .tab {
    padding: .6rem 1.2rem; font-family: 'Archivo Black', sans-serif; font-size: .8rem;
    text-transform: uppercase; cursor: pointer; border: 4px solid #000; border-bottom: none;
    margin-bottom: -4px; background: #eee; margin-right: -4px;
  }
  .tab.active { background: #fff; position: relative; z-index: 1; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .preview-area { border: 4px solid #000; background: #fff; padding: 1.5rem; min-height: 300px; }
  .preview-area h2 { font-family: 'Archivo Black', sans-serif; font-size: 1.3rem; text-transform: uppercase; border-bottom: 4px solid #000; padding-bottom: .4rem; margin: 1.5rem 0 .6rem; }
  .preview-area h3 { font-family: 'Archivo Black', sans-serif; font-size: 1rem; text-transform: uppercase; margin: 1.2rem 0 .4rem; }
  .preview-area p { font-size: 1rem; line-height: 1.85; margin-bottom: .9rem; font-weight: 500; }
  .preview-area ul { padding-left: 1.5rem; margin-bottom: .9rem; }
  .preview-area li { font-size: .95rem; line-height: 1.75; font-weight: 500; margin-bottom: .25rem; }
  .preview-area strong { font-weight: 900; }
  .preview-area blockquote { border-left: 5px solid #000; background: #FFD800; padding: .75rem 1rem; margin: 1rem 0; font-weight: 700; }
  .preview-area table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  .preview-area th { background: #000; color: #FFD800; font-family: 'Archivo Black', sans-serif; font-size: .8rem; text-transform: uppercase; padding: .5rem .75rem; text-align: left; border: 3px solid #000; }
  .preview-area td { border: 3px solid #000; padding: .45rem .75rem; font-size: .9rem; font-weight: 500; }
  .preview-area tr:nth-child(even) td { background: #fffbe6; }
  .preview-area hr { border: none; border-top: 4px solid #000; margin: 1.5rem 0; }

  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .compare-panel { border: 4px solid #000; background: #fff; padding: 1rem; }
  .compare-panel .cp-title { font-family: 'Archivo Black', sans-serif; font-size: .8rem; text-transform: uppercase; border-bottom: 3px solid #000; padding-bottom: .4rem; margin-bottom: .75rem; }
  .cp-score { font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; }
  .cp-bar { height: 8px; background: #eee; border: 2px solid #000; margin: .3rem 0; }
  .cp-fill { height: 100%; }
  .cp-label { font-size: .75rem; font-weight: 700; display: flex; justify-content: space-between; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { max-height: 220px; }
    .fields-grid { grid-template-columns: 1fr; }
    .score-grid { grid-template-columns: repeat(3,1fr); }
    .compare-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1><span class="logo-hash">#</span>4RAP.GEN</h1>
  <span class="header-sub">Editor článků → GitHub → Vercel</span>
</header>

<div id="statusBar" class="status-bar hidden"></div>

<div class="app">
  <aside class="sidebar">
    <button class="btn btn-black" onclick="newArticle()">＋ Nový článek</button>
    <input type="text" id="searchInput" placeholder="Hledat..." oninput="renderList()"
      style="border:3px solid #000;padding:.5rem .75rem;width:100%;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;outline:none">
    <div style="display:flex;gap:.4rem;flex-wrap:wrap">
      <button class="btn btn-sm btn-black" id="fAll" onclick="filterStatus('')">Vše</button>
      <button class="btn btn-sm" id="fKoncept" onclick="filterStatus('koncept')">Koncepty</button>
      <button class="btn btn-sm" id="fPub" onclick="filterStatus('pub')">Pub.</button>
    </div>
    <div style="border-top:3px solid #000;padding-top:.5rem">
      <div class="sidebar-title">Články (<span id="articleCount">0</span>)</div>
      <div id="articleList"></div>
    </div>
  </aside>

  <main class="main">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('editor')">✏️ Editor</div>
      <div class="tab" onclick="switchTab('preview')">👁 Náhled</div>
      <div class="tab" onclick="switchTab('import')">📥 Import .mdx</div>
      <div class="tab" onclick="switchTab('compare')">⚖️ Porovnat</div>
    </div>

    <!-- EDITOR -->
    <div id="tab-editor" class="tab-content active">
      <div class="fields-grid">
        <div class="field" style="grid-column:span 2">
          <label>Název článku</label>
          <input type="text" id="fTitle" placeholder="Např. Eminem: Bůh slova a jeho cesta zpět" oninput="autoSlug()">
        </div>
        <div class="field">
          <label>Slug (URL)</label>
          <input type="text" id="fSlug" placeholder="eminem-buh-slova">
        </div>
        <div class="field">
          <label>Kategorie</label>
          <select id="fCategory">
            <option value="Rapeři">Rapeři</option>
            <option value="Návody">Návody</option>
            <option value="Články">Články</option>
          </select>
        </div>
        <div class="field">
          <label>Datum</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>Autor</label>
          <input type="text" id="fAuthor" value="Rap Reportér">
        </div>
        <div class="field" style="grid-column:span 2">
          <label>Excerpt (max 160 znaků)</label>
          <input type="text" id="fExcerpt" placeholder="Krátký popis pro SEO a náhled" maxlength="160">
        </div>
        <div class="field">
          <label>Tagy (čárkou)</label>
          <input type="text" id="fTags" placeholder="rapeři, usa, legenda">
        </div>
        <div class="field">
          <label>Status</label>
          <select id="fStatus">
            <option value="koncept">Koncept</option>
            <option value="publikováno">Publikováno</option>
          </select>
        </div>
      </div>

      <div class="editor-area">
        <div class="editor-toolbar">
          <span style="color:#888;font-size:.75rem;font-weight:700;text-transform:uppercase;margin-right:.25rem">MD:</span>
          <button class="toolbar-btn" onclick="insertMd('## ','')">H2</button>
          <button class="toolbar-btn" onclick="insertMd('### ','')">H3</button>
          <button class="toolbar-btn" onclick="insertMd('**','**')"><b>B</b></button>
          <button class="toolbar-btn" onclick="insertMd('*','*')"><i>I</i></button>
          <button class="toolbar-btn" onclick="insertMd('> ','')">Quote</button>
          <button class="toolbar-btn" onclick="insertMd('---\n','')">HR</button>
          <button class="toolbar-btn" onclick="insertTable()">Table</button>
          <button class="toolbar-btn" onclick="insertMd('- ','')">List</button>
          <span style="flex:1"></span>
          <span id="wordCount" style="color:#888;font-size:.75rem;font-weight:700"></span>
        </div>
        <textarea id="contentEditor" placeholder="Piš článek v Markdown formátu..." oninput="updateWordCount()"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-yellow" onclick="saveArticle()" style="flex:1">💾 Uložit</button>
        <button class="btn" onclick="evaluateArticle()" style="flex:1">🤖 AI hodnocení</button>
        <button class="btn btn-black" onclick="publishToGitHub()" style="flex:1">🚀 GitHub</button>
        <button class="btn btn-sm" onclick="exportMdx()">⬇️ .mdx</button>
        <button class="btn btn-sm btn-red" onclick="deleteArticle()">🗑</button>
      </div>

      <div id="scorePanel" class="score-panel hidden">
        <div class="score-panel-title">
          <span>🤖 AI Hodnocení</span>
          <span id="scoreVerdict" style="font-size:1rem"></span>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.75rem">
          <span class="score-total" id="scoreTotal">—</span>
          <div id="scoreFeedback" class="score-feedback" style="flex:1"></div>
        </div>
        <div class="score-grid" id="scoreGrid"></div>
        <div id="scoreImprovements" style="margin-top:.5rem;font-size:.85rem;font-weight:600"></div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div id="tab-preview" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <span class="heading" style="font-size:.85rem">Náhled</span>
        <button class="btn btn-sm" onclick="renderPreview()">🔄 Obnovit</button>
      </div>
      <div id="previewArea" class="preview-area"></div>
    </div>

    <!-- IMPORT -->
    <div id="tab-import" class="tab-content">
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.style.background='#FFD800'"
        ondragleave="this.style.background='#fff'"
        ondrop="handleDrop(event)">
        <p>📂 Klikni nebo přetáhni .mdx soubor</p>
        <p class="sub">Načte frontmatter i obsah automaticky</p>
      </div>
      <input type="file" id="fileInput" accept=".mdx,.md" class="hidden" onchange="handleFileInput(event)">
      <div id="importPreview" class="hidden" style="margin-top:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
          <span class="heading" style="font-size:.85rem">Náhled importu</span>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-sm" onclick="evaluateImported()">🤖 Ohodnotit</button>
            <button class="btn btn-sm btn-black" onclick="applyImport()">✅ Použít v editoru</button>
          </div>
        </div>
        <div id="importContent" style="border:4px solid #000;background:#fff;padding:1rem;font-family:monospace;font-size:.8rem;line-height:1.6;white-space:pre-wrap;max-height:400px;overflow-y:auto"></div>
        <div id="importScore" class="score-panel hidden" style="margin-top:1rem"></div>
      </div>
    </div>

    <!-- COMPARE -->
    <div id="tab-compare" class="tab-content">
      <p style="font-weight:700;margin-bottom:1rem">Porovnej dva články pomocí AI hodnocení.</p>
      <div style="display:flex;gap:.75rem;align-items:flex-end;margin-bottom:1rem;flex-wrap:wrap">
        <div class="field" style="flex:1;min-width:180px">
          <label>Článek A (aktuální)</label>
          <select id="compareA" style="border:3px solid #000;padding:.5rem;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;width:100%"></select>
        </div>
        <div class="field" style="flex:1;min-width:180px">
          <label>Článek B</label>
          <select id="compareB" style="border:3px solid #000;padding:.5rem;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;width:100%"></select>
        </div>
        <button class="btn btn-sm btn-black" onclick="runCompare()" style="white-space:nowrap">⚖️ Porovnat</button>
      </div>
      <div id="compareResult" class="compare-grid hidden"></div>
    </div>
  </main>
</div>

<script>
const API_BASE = 'https://soul-goodman-copy-8d1113da.base44.app/functions';
const STORAGE_KEY = '4rapgen_v2';
let articles = [];
let currentId = null;
let filterVal = '';
let importedData = null;

function load() {
  try { articles = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { articles = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(articles)); }

document.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  renderList();
  if (articles.length > 0) loadArticle(articles[0].id);
});

function renderList() {
  load();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = articles.filter(a => {
    const mq = !q || (a.title||'').toLowerCase().includes(q) || (a.tags||'').toLowerCase().includes(q);
    const ms = !filterVal || (filterVal === 'pub' ? a.status === 'publikováno' : a.status === 'koncept');
    return mq && ms;
  });
  document.getElementById('articleCount').textContent = filtered.length;
  const catClass = { 'Rapeři': 'Raperi', 'Návody': 'Navody', 'Články': 'Clanky' };
  document.getElementById('articleList').innerHTML = filtered.length === 0
    ? '<p style="font-size:.85rem;color:#666;font-weight:600;padding:.5rem 0">Žádné články.</p>'
    : filtered.map(a => `
      <div class="article-item ${a.id === currentId ? 'active' : ''}" onclick="loadArticle('${a.id}')">
        <div class="item-title">${a.title || '(bez názvu)'}</div>
        <div class="item-meta">
          <span class="badge badge-${catClass[a.category]||'Raperi'}">${a.category||'?'}</span>
          <span class="badge badge-${a.status==='publikováno'?'pub':'koncept'}">${a.status||'koncept'}</span>
          ${a.score != null ? `<span style="font-size:.7rem;font-weight:900;color:${a.score>=20?'#16a34a':'#dc2626'}">${a.score}/25</span>` : ''}
          ${a.github_committed ? '<span style="font-size:.7rem;font-weight:700;color:#6366f1">✓ GH</span>' : ''}
        </div>
      </div>`).join('');
}

function filterStatus(s) {
  filterVal = s;
  renderList();
}

function newArticle() {
  load();
  const id = 'art_' + Date.now();
  articles.unshift({ id, title: '', slug: '', excerpt: '', content: '', category: 'Rapeři', tags: '', author: 'Rap Reportér', date: new Date().toISOString().split('T')[0], status: 'koncept' });
  save();
  loadArticle(id);
}

function loadArticle(id) {
  load();
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentId = id;
  document.getElementById('fTitle').value = a.title || '';
  document.getElementById('fSlug').value = a.slug || '';
  document.getElementById('fExcerpt').value = a.excerpt || '';
  document.getElementById('fCategory').value = a.category || 'Rapeři';
  document.getElementById('fTags').value = a.tags || '';
  document.getElementById('fAuthor').value = a.author || 'Rap Reportér';
  document.getElementById('fDate').value = a.date || '';
  document.getElementById('fStatus').value = a.status || 'koncept';
  document.getElementById('contentEditor').value = a.content || '';
  updateWordCount();
  renderList();
  if (a.score != null) {
    try { showScore(JSON.parse(a.score_breakdown||'{}'), a.score, a.score_feedback||'', a.score_improvements||[]); }
    catch { document.getElementById('scorePanel').classList.add('hidden'); }
  } else {
    document.getElementById('scorePanel').classList.add('hidden');
  }
  switchTab('editor');
}

function getFormData() {
  return {
    id: currentId,
    title: document.getElementById('fTitle').value.trim(),
    slug: document.getElementById('fSlug').value.trim(),
    excerpt: document.getElementById('fExcerpt').value.trim(),
    content: document.getElementById('contentEditor').value,
    category: document.getElementById('fCategory').value,
    tags: document.getElementById('fTags').value.trim(),
    author: document.getElementById('fAuthor').value.trim(),
    date: document.getElementById('fDate').value,
    status: document.getElementById('fStatus').value,
  };
}

function saveArticle() {
  load();
  if (!currentId) { newArticle(); return; }
  const data = getFormData();
  const idx = articles.findIndex(a => a.id === currentId);
  if (idx === -1) return;
  articles[idx] = { ...articles[idx], ...data };
  save();
  renderList();
  setStatus('💾 Uloženo', 'success', 1500);
}

function deleteArticle() {
  if (!currentId || !confirm('Smazat tento článek?')) return;
  load();
  articles = articles.filter(a => a.id !== currentId);
  currentId = null;
  save();
  renderList();
  clearForm();
  document.getElementById('scorePanel').classList.add('hidden');
}

function clearForm() {
  ['fTitle','fSlug','fExcerpt','fTags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAuthor').value = 'Rap Reportér';
  document.getElementById('contentEditor').value = '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
}

function autoSlug() {
  const v = document.getElementById('fTitle').value;
  document.getElementById('fSlug').value = v.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'').trim()
    .replace(/\s+/g,'-').replace(/-+/g,'-');
}

function updateWordCount() {
  const w = document.getElementById('contentEditor').value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent = w + ' slov';
}

function insertMd(b, a) {
  const ta = document.getElementById('contentEditor');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s,e);
  ta.value = ta.value.substring(0,s) + b + sel + a + ta.value.substring(e);
  ta.selectionStart = s + b.length; ta.selectionEnd = s + b.length + sel.length;
  ta.focus(); updateWordCount();
}

function insertTable() {
  insertMd('| Sloupec 1 | Sloupec 2 | Sloupec 3 |\n|---|---|---|\n| Data | Data | Data |\n','');
}

async function evaluateArticle() {
  const data = getFormData();
  if (data.content.length < 100) { setStatus('❌ Článek je příliš krátký', 'error', 3000); return; }
  setStatus('<span class="spinner"></span> AI hodnotí...', 'loading');
  try {
    const r = await callAPI('evaluateArticle', { title: data.title, category: data.category, content: data.content });
    saveArticle();
    load();
    const idx = articles.findIndex(a => a.id === currentId);
    if (idx !== -1) {
      articles[idx].score = r.total;
      articles[idx].score_breakdown = JSON.stringify(r.scores||{});
      articles[idx].score_feedback = r.feedback||'';
      articles[idx].score_improvements = r.improvements||[];
      save(); renderList();
    }
    showScore(r.scores||{}, r.total, r.feedback||'', r.improvements||[], r.verdict);
    setStatus(`${r.verdict==='PASS'?'✅':'⚠️'} ${r.total}/25 — ${r.verdict}`, r.verdict==='PASS'?'success':'error', 4000);
  } catch(e) { setStatus('❌ ' + e.message, 'error', 4000); }
}

function showScore(scores, total, feedback, improvements=[], verdict='') {
  document.getElementById('scorePanel').classList.remove('hidden');
  const totalEl = document.getElementById('scoreTotal');
  totalEl.textContent = total + '/25';
  totalEl.style.color = total >= 20 ? '#16a34a' : '#dc2626';
  document.getElementById('scoreFeedback').textContent = feedback;
  const vEl = document.getElementById('scoreVerdict');
  vEl.textContent = verdict === 'PASS' ? '✅ PASS' : verdict === 'REWRITE' ? '⚠️ REWRITE' : '';
  vEl.className = 'heading ' + (verdict === 'PASS' ? 'verdict-pass' : 'verdict-rewrite');
  const labels = {gramatika:'Gramatika',ton:'Tón',poutavost:'Poutavost',pravdivost:'Pravdivost',podani:'Podání'};
  document.getElementById('scoreGrid').innerHTML = Object.entries(labels).map(([k,l]) => {
    const v = scores[k] ?? '—';
    const c = typeof v==='number' ? (v>=4?'#16a34a':v>=3?'#ca8a04':'#dc2626') : '#000';
    return `<div class="score-item"><div class="score-val" style="color:${c}">${v}</div><div class="score-lbl">${l}</div></div>`;
  }).join('');
  document.getElementById('scoreImprovements').innerHTML = improvements.length
    ? '<b style="font-size:.78rem;text-transform:uppercase">Návrhy:</b><ul style="padding-left:1.2rem;margin-top:.3rem">' + improvements.map(i=>`<li>${i}</li>`).join('') + '</ul>' : '';
}

async function publishToGitHub() {
  saveArticle();
  const data = getFormData();
  if (!data.slug || !data.content) { setStatus('❌ Chybí slug nebo obsah', 'error', 3000); return; }
  if (!confirm(`Publikovat "${data.title}" na GitHub?`)) return;
  setStatus('<span class="spinner"></span> Commituju na GitHub...', 'loading');
  try {
    const r = await callAPI('commitArticleToGithub', data);
    load();
    const idx = articles.findIndex(a => a.id === currentId);
    if (idx !== -1) { articles[idx].status = 'publikováno'; articles[idx].github_committed = true; articles[idx].github_sha = r.sha; save(); renderList(); }
    document.getElementById('fStatus').value = 'publikováno';
    setStatus('✅ Publikováno → ' + r.filePath, 'success', 6000);
  } catch(e) { setStatus('❌ GitHub: ' + e.message, 'error', 5000); }
}

function exportMdx() {
  saveArticle();
  const d = getFormData();
  const date = d.date || new Date().toISOString().split('T')[0];
  const tags = d.tags.split(',').map(t=>t.trim()).filter(Boolean);
  const mdx = `---\ntitle: "${d.title}"\nslug: "${d.slug}"\nexcerpt: "${d.excerpt}"\ndate: "${date}"\ntags: ${JSON.stringify(tags)}\ncategory: "${d.category}"\ncoverImage: "/images/cover.jpg"\nauthor: "${d.author}"\npublished: true\n---\n\n${d.content}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([mdx], {type:'text/plain'}));
  a.download = `${date}-${d.slug}.mdx`;
  a.click();
  setStatus('⬇️ Staženo: ' + a.download, 'success', 2000);
}

function handleFileInput(e) { if (e.target.files[0]) readMdx(e.target.files[0]); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').style.background = '#fff';
  if (e.dataTransfer.files[0]) readMdx(e.dataTransfer.files[0]);
}

function readMdx(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const raw = e.target.result;
    importedData = parseFm(raw);
    document.getElementById('importContent').textContent = raw.slice(0,2500) + (raw.length>2500?'\n[...]':'');
    document.getElementById('importPreview').classList.remove('hidden');
    document.getElementById('importScore').classList.add('hidden');
    setStatus('📥 ' + file.name, 'success', 2000);
  };
  reader.readAsText(file,'utf-8');
}

function parseFm(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { content: raw };
  const fm = {};
  for (const line of m[1].split('\n')) {
    const c = line.indexOf(':'); if (c===-1) continue;
    const key = line.slice(0,c).trim();
    let val = line.slice(c+1).trim();
    if (val.startsWith('"')&&val.endsWith('"')) val=val.slice(1,-1);
    if (val.startsWith("'")&&val.endsWith("'")) val=val.slice(1,-1);
    fm[key] = val;
  }
  return {...fm, content: m[2]};
}

function applyImport() {
  if (!importedData) return;
  if (!currentId) newArticle();
  document.getElementById('fTitle').value = importedData.title||'';
  document.getElementById('fSlug').value = importedData.slug||'';
  document.getElementById('fExcerpt').value = importedData.excerpt||'';
  if (importedData.category) document.getElementById('fCategory').value = importedData.category;
  document.getElementById('fTags').value = importedData.tags||'';
  document.getElementById('fAuthor').value = importedData.author||'Rap Reportér';
  if (importedData.date) document.getElementById('fDate').value = importedData.date;
  document.getElementById('contentEditor').value = importedData.content||'';
  saveArticle(); updateWordCount(); switchTab('editor');
  setStatus('✅ Importováno do editoru', 'success', 2000);
}

async function evaluateImported() {
  if (!importedData) return;
  setStatus('<span class="spinner"></span> Hodnotím importovaný článek...', 'loading');
  try {
    const r = await callAPI('evaluateArticle', { title: importedData.title, category: importedData.category, content: importedData.content });
    const panel = document.getElementById('importScore');
    panel.classList.remove('hidden');
    panel.innerHTML = `<div style="font-family:'Archivo Black',sans-serif;font-size:.85rem;text-transform:uppercase;margin-bottom:.5rem">AI hodnocení importu</div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:2rem;color:${r.total>=20?'#16a34a':'#dc2626'}">${r.total}/25 — ${r.verdict}</div>
      <p style="font-size:.9rem;font-weight:600;margin-top:.5rem;line-height:1.6">${r.feedback||''}</p>`;
    setStatus(`${r.verdict==='PASS'?'✅':'⚠️'} Import: ${r.total}/25`, r.verdict==='PASS'?'success':'error', 4000);
  } catch(e) { setStatus('❌ ' + e.message, 'error', 4000); }
}

function renderPreview() {
  const content = document.getElementById('contentEditor').value;
  const title = document.getElementById('fTitle').value;
  document.getElementById('previewArea').innerHTML =
    `<h1 style="font-family:'Archivo Black',sans-serif;font-size:2rem;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:1.25rem;line-height:1.05">${title}</h1>` + md2html(content);
}

function md2html(md) {
  return md
    .replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g, (_,h,rows)=>{
      const ths = h.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const trs = rows.trim().split('\n').map(row=>`<tr>${row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    })
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1 style="font-family:\'Archivo Black\',sans-serif;font-size:1.6rem;text-transform:uppercase;margin:1rem 0 .5rem">$1</h1>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/^(?!<[htulbr])(.+)$/gm,'<p>$1</p>');
}

function populateCompareSelects() {
  load();
  const opts = articles.map(a=>`<option value="${a.id}">${a.title||'(bez názvu)'}</option>`).join('');
  document.getElementById('compareA').innerHTML = opts;
  document.getElementById('compareB').innerHTML = opts;
  if (currentId) document.getElementById('compareA').value = currentId;
}

async function runCompare() {
  const idA = document.getElementById('compareA').value;
  const idB = document.getElementById('compareB').value;
  if (!idA || !idB || idA === idB) { setStatus('❌ Vyber dvě různé články', 'error', 2000); return; }
  load();
  const a = articles.find(x=>x.id===idA);
  const b = articles.find(x=>x.id===idB);
  setStatus('<span class="spinner"></span> Porovnávám...', 'loading');
  const [sA, sB] = await Promise.all([
    a.score!=null ? {total:a.score,scores:JSON.parse(a.score_breakdown||'{}'),feedback:a.score_feedback} : callAPI('evaluateArticle',{title:a.title,category:a.category,content:a.content}).catch(()=>({total:0,scores:{},feedback:''})),
    b.score!=null ? {total:b.score,scores:JSON.parse(b.score_breakdown||'{}'),feedback:b.score_feedback} : callAPI('evaluateArticle',{title:b.title,category:b.category,content:b.content}).catch(()=>({total:0,scores:{},feedback:''}))
  ]);
  const el = document.getElementById('compareResult');
  el.classList.remove('hidden');
  el.innerHTML = cpPanel(a.title,sA,'A') + cpPanel(b.title,sB,'B');
  setStatus('✅ Porovnání hotovo', 'success', 2000);
}

function cpPanel(title, score, label) {
  const t = score.total||0, pct=(t/25*100).toFixed(0), c=t>=20?'#16a34a':t>=15?'#ca8a04':'#dc2626';
  const labels = {gramatika:'Gram.',ton:'Tón',poutavost:'Poutav.',pravdivost:'Pravd.',podani:'Podání'};
  const bars = Object.entries(labels).map(([k,l])=>{
    const v=(score.scores||{})[k]??0;
    return `<div class="cp-label"><span>${l}</span><span>${v}/5</span></div><div class="cp-bar"><div class="cp-fill" style="width:${v/5*100}%;background:${v>=4?'#16a34a':v>=3?'#FFD800':'#FF4A4A'}"></div></div>`;
  }).join('');
  return `<div class="compare-panel"><div class="cp-title">${label}: ${title||'?'}</div><div class="cp-score" style="color:${c}">${t}/25</div><div style="width:100%;height:10px;background:#eee;border:2px solid #000;margin:.4rem 0"><div style="width:${pct}%;height:100%;background:${c}"></div></div>${bars}<p style="font-size:.8rem;font-weight:600;color:#444;margin-top:.6rem;line-height:1.5">${score.feedback||''}</p></div>`;
}

function switchTab(name) {
  const names = ['editor','preview','import','compare'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='preview') renderPreview();
  if (name==='compare') populateCompareSelects();
}

async function callAPI(endpoint, payload) {
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

let statusTimer;
function setStatus(msg, type='', dur=0) {
  const b = document.getElementById('statusBar');
  b.innerHTML = msg; b.className = 'status-bar ' + type; b.classList.remove('hidden');
  clearTimeout(statusTimer);
  if (dur) statusTimer = setTimeout(()=>b.classList.add('hidden'), dur);
}
</script>
